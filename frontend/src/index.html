<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción al Evento - Proyecto IES</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { padding: 0.75rem 1.5rem; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem;}
        button:hover { background-color: #0056b3; }
        #mensaje { margin-top: 1.5rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>Inscripción y Pago</h2>
    <p>Completa tus datos y adjunta la captura o PDF de tu transferencia.</p>

    <form id="formulario-inscripcion">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
        </div>

        <div class="form-group">
            <label for="dni">DNI:</label>
            <input type="number" id="dni" name="dni" required>
        </div>

        <div class="form-group">
            <label for="mail">Correo Electrónico:</label>
            <input type="email" id="mail" name="mail" required>
        </div>

        <div class="form-group">
            <label for="comprobante">Comprobante de Pago (Imagen o PDF):</label>
            <input type="file" id="comprobante" name="comprobante" accept="image/*,application/pdf" required>
        </div>

        <button type="submit">Enviar Inscripción</button>
    </form>

    <div id="mensaje"></div>

    <script>
        // 1. Seleccionamos el formulario y la caja de mensajes
        const form = document.getElementById('formulario-inscripcion');
        const divMensaje = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue al enviar

            // Mensaje de carga para el usuario
            divMensaje.textContent = "⏳ Subiendo comprobante y procesando datos...";
            divMensaje.style.color = "blue";

            // 2. FormData atrapa automáticamente todos los inputs (textos y archivos)
            const formData = new FormData(form);

            try {
                // 3. Enviamos los datos al backend
                // NOTA: Cambia http://localhost:3000 por tu URL de Render/Vercel en producción
                const respuesta = await fetch('http://localhost:3000/inscripcion', {
                    method: 'POST',
                    body: formData 
                    // ATENCIÓN: ¡No pongas el header 'Content-Type': 'application/json'!
                    // El navegador configura el Content-Type 'multipart/form-data' automáticamente.
                });

                // 4. Leemos la respuesta de Express
                const resultado = await respuesta.json();

                if (respuesta.ok) {
                    // Código 200/201: Todo salió bien
                    divMensaje.textContent = "✅ ¡Éxito! " + resultado.mensaje;
                    divMensaje.style.color = "green";
                    form.reset(); // Limpiamos el formulario
                } else {
                    // Código 400/500: Hubo un error en el backend
                    divMensaje.textContent = "❌ Error: " + (resultado.error || "Algo falló en el servidor");
                    divMensaje.style.color = "red";
                }

            } catch (error) {
                console.error("Error en la petición:", error);
                divMensaje.textContent = "❌ Error de conexión. ¿Está encendido el servidor?";
                divMensaje.style.color = "red";
            }
        });
    </script>
</body>
</html>
